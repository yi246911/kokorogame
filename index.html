<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心ちゃんのゲームランド</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
body { width:100vw; height:100vh; overflow:hidden; font-family:'Comic Sans MS','Chalkboard SE',cursive; cursor:pointer; }

.screen { position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.3s, transform 0.3s; }
.screen.hidden { opacity:0; pointer-events:none; transform:scale(1.04); }

.back-btn {
  position:fixed; top:14px; left:14px; z-index:100;
  background:rgba(255,255,255,0.92); border:3px solid #ffab40;
  border-radius:50px; padding:9px 20px; font-size:clamp(13px,2.8vw,19px);
  font-family:inherit; font-weight:900; color:#ff6f00; cursor:pointer;
  box-shadow:0 4px 14px rgba(255,111,0,0.2); transition:transform 0.1s;
}
.back-btn:active { transform:scale(0.89); }

.score-badge {
  position:fixed; top:14px; right:14px; z-index:100;
  background:linear-gradient(135deg,#ff6f00,#ffca28);
  color:#fff; border-radius:50px; padding:8px 20px;
  font-size:clamp(13px,2.8vw,21px); font-weight:900;
  box-shadow:0 4px 14px rgba(255,111,0,0.35);
}
.score-badge.bump { animation:score-bump 0.28s ease-out; }
@keyframes score-bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

/* TOP */
#top-screen { background:radial-gradient(ellipse at 40% 35%,#fffde7 0%,#fce4d6 50%,#fbc8e0 100%); }
.top-title {
  font-size:clamp(20px,5.5vw,50px); font-weight:900; color:#ff5722;
  text-shadow:4px 4px 0 #ffe0b2, 0 0 30px #ffab4088;
  animation:bounce-title 2.2s ease-in-out infinite; margin-bottom:5px; text-align:center; padding:0 8px;
}
@keyframes bounce-title { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.top-sub { font-size:clamp(11px,2.5vw,18px); color:#ff8a65; margin-bottom:14px; text-align:center; }

.modes-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:clamp(7px,1.8vw,16px); padding:0 clamp(7px,2.5vw,24px) 12px;
  width:100%; max-width:740px;
}
.mode-card {
  border-radius:20px; padding:clamp(10px,2.2vw,20px) clamp(7px,1.8vw,15px);
  display:flex; flex-direction:column; align-items:center; gap:5px;
  box-shadow:0 6px 20px rgba(0,0,0,0.11); border:4px solid transparent;
  cursor:pointer; transition:transform 0.13s, box-shadow 0.13s;
  animation:card-in 0.5s cubic-bezier(.34,1.56,.64,1) both;
}
.mode-card:nth-child(1){animation-delay:.04s;border-color:#ffb74d;background:linear-gradient(155deg,#fff8e1,#fff3e0);}
.mode-card:nth-child(2){animation-delay:.10s;border-color:#81d4fa;background:linear-gradient(155deg,#e1f5fe,#e0f7fa);}
.mode-card:nth-child(3){animation-delay:.16s;border-color:#ce93d8;background:linear-gradient(155deg,#f3e5f5,#fce4ec);}
.mode-card:nth-child(4){animation-delay:.22s;border-color:#a5d6a7;background:linear-gradient(155deg,#e8f5e9,#f1f8e9);}
.mode-card:nth-child(5){animation-delay:.28s;border-color:#f48fb1;background:linear-gradient(155deg,#fce4ec,#fff8e1);}
.mode-card:nth-child(6){animation-delay:.34s;border-color:#80cbc4;background:linear-gradient(155deg,#e0f2f1,#e8eaf6);}
.mode-card:active { transform:scale(0.91); box-shadow:0 3px 10px rgba(0,0,0,0.09); }
@keyframes card-in { from{opacity:0;transform:scale(0.3) rotate(-12deg)} to{opacity:1;transform:scale(1) rotate(0)} }
.mode-icon { font-size:clamp(28px,7vw,54px); }
.mode-name { font-size:clamp(11px,2.5vw,19px); font-weight:900; color:#555; text-align:center; }
.mode-desc { font-size:clamp(8px,1.6vw,12px); color:#999; text-align:center; line-height:1.35; }

.deco-float { position:absolute; font-size:clamp(18px,4vw,36px); animation:deco-drift 4s ease-in-out infinite; pointer-events:none; opacity:0.4; }
@keyframes deco-drift { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-13px) rotate(9deg)} }

/* SHARED FX */
.game-bg { position:fixed; inset:0; z-index:0; transition:background 0.35s; }
.star-fx { position:fixed; pointer-events:none; font-size:clamp(16px,3.5vw,30px); z-index:50; animation:star-fly 0.9s ease-out forwards; }
@keyframes star-fly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.15)} }
.ripple-fx { position:fixed; border-radius:50%; pointer-events:none; z-index:45; animation:ripple-grow 0.6s ease-out forwards; }
@keyframes ripple-grow { 0%{transform:scale(0);opacity:0.68} 100%{transform:scale(7);opacity:0} }
.praise-fx {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:clamp(44px,11vw,98px); color:#ff6f00;
  text-shadow:4px 4px 0 #fff176, 0 0 40px #ffca2888;
  pointer-events:none; z-index:60; opacity:0; font-weight:900;
}
.praise-fx.show { animation:praise-pop 1.2s cubic-bezier(.36,.07,.19,.97) forwards; }
@keyframes praise-pop {
  0%{transform:scale(0.25) rotate(-8deg);opacity:1}
  30%{transform:scale(1.35) rotate(4deg);opacity:1}
  60%{transform:scale(0.94) rotate(-2deg);opacity:1}
  80%{transform:scale(1.06);opacity:1}
  100%{transform:scale(1);opacity:0}
}

/* MODE 1 — ANIMAL */
.animal-btn { position:absolute; border:none; background:none; cursor:pointer; animation:float-in 0.48s cubic-bezier(.34,1.56,.64,1) forwards; z-index:10; }
@keyframes float-in { from{opacity:0;transform:scale(0.15) rotate(-18deg)} to{opacity:1;transform:scale(1) rotate(0)} }
.animal-circle {
  display:flex; align-items:center; justify-content:center; border-radius:50%;
  box-shadow:0 8px 28px rgba(0,0,0,0.18),inset 0 -4px 10px rgba(0,0,0,0.07);
  border:5px solid rgba(255,255,255,0.6); position:relative; overflow:hidden;
}
.animal-circle::after { content:''; position:absolute; top:10%;left:15%; width:30%;height:18%; background:rgba(255,255,255,0.45); border-radius:50%; transform:rotate(-30deg); }
.popping { animation:pop-out 0.42s cubic-bezier(.36,.07,.19,.97) forwards !important; }
@keyframes pop-out { 0%{transform:scale(1);opacity:1} 40%{transform:scale(1.65);opacity:1} 100%{transform:scale(0);opacity:0} }

/* MODE 2 — PIANO */
#mode2-screen { background:linear-gradient(160deg,#e3f2fd,#e8eaf6 50%,#f3e5f5); }
.piano-wrap { display:flex; flex-direction:column; align-items:center; width:100%; padding:0 4px; margin-top:56px; }
.piano-title { font-size:clamp(14px,3.5vw,27px); color:#5c6bc0; font-weight:900; margin-bottom:12px; text-shadow:2px 2px 0 #c5cae9; }
.piano-keys { display:flex; gap:clamp(3px,0.9vw,7px); padding:0 2px; justify-content:center; }
.piano-key {
  display:flex; align-items:flex-end; justify-content:center; padding-bottom:7px;
  width:clamp(34px,8vw,60px); height:clamp(100px,21vw,165px);
  border-radius:0 0 12px 12px; cursor:pointer;
  box-shadow:0 7px 0 rgba(0,0,0,0.2),0 10px 14px rgba(0,0,0,0.13);
  transition:transform 0.05s, box-shadow 0.05s; border:3px solid rgba(255,255,255,0.5); position:relative; overflow:hidden;
}
.piano-key:active,.piano-key.pressed { transform:translateY(6px); box-shadow:0 2px 0 rgba(0,0,0,0.18),0 3px 6px rgba(0,0,0,0.09); }
.piano-key::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.35) 0%,rgba(255,255,255,0) 55%); }
.key-note { font-size:clamp(8px,1.7vw,13px); color:rgba(255,255,255,0.9); font-weight:900; }

/* MODE 3 — BUBBLE */
.bubble {
  position:absolute; border-radius:50%; cursor:pointer;
  animation:bubble-in 0.5s cubic-bezier(.34,1.56,.64,1) forwards; z-index:10;
  display:flex; align-items:center; justify-content:center;
  box-shadow:inset -5px -5px 12px rgba(0,0,0,0.09),inset 4px 4px 10px rgba(255,255,255,0.6),0 6px 18px rgba(0,0,0,0.1);
}
.bubble::after { content:''; position:absolute; top:12%;left:18%; width:22%;height:14%; background:rgba(255,255,255,0.7); border-radius:50%; transform:rotate(-35deg); }
@keyframes bubble-in { from{opacity:0;transform:scale(0.04)} to{opacity:1;transform:scale(1)} }
.bubble-pop { animation:bubble-burst 0.36s cubic-bezier(.36,.07,.19,.97) forwards !important; }
@keyframes bubble-burst { 0%{transform:scale(1);opacity:1} 55%{transform:scale(1.6);opacity:0.65} 100%{transform:scale(0.04);opacity:0} }

/* MODE 4 — DRUM */
#mode4-screen { background:linear-gradient(160deg,#fff8e1,#fce4ec 60%,#e8f5e9); }
.drum-wrap { display:flex; flex-direction:column; align-items:center; width:100%; padding:60px 10px 10px; gap:clamp(7px,1.6vw,14px); }
.drum-title { font-size:clamp(13px,3.2vw,24px); color:#e91e63; font-weight:900; text-shadow:2px 2px 0 #fce4ec; }
.drum-row { display:flex; gap:clamp(7px,1.8vw,14px); justify-content:center; }
.drum-pad {
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  box-shadow:0 6px 0 rgba(0,0,0,0.17),0 10px 18px rgba(0,0,0,0.11);
  transition:transform 0.06s, box-shadow 0.06s; position:relative; overflow:hidden; border:4px solid rgba(255,255,255,0.55);
}
.drum-pad:active,.drum-pad.hit { transform:scale(0.86); box-shadow:0 2px 0 rgba(0,0,0,0.13),0 3px 6px rgba(0,0,0,0.08); }
.drum-pad::before { content:''; position:absolute; inset:0; background:linear-gradient(155deg,rgba(255,255,255,0.35),rgba(255,255,255,0)); }

/* MODE 5 — COLOR MATCH */
#mode5-screen { background:linear-gradient(160deg,#fce4ec,#fff8e1 50%,#e8f5e9); }
.colormatch-wrap { display:flex; flex-direction:column; align-items:center; width:100%; padding:62px 10px 10px; gap:12px; }
.cm-title { font-size:clamp(13px,3.2vw,24px); color:#e91e63; font-weight:900; text-align:center; }
.cm-target-box {
  display:flex; flex-direction:column; align-items:center; gap:5px;
  background:rgba(255,255,255,0.7); border-radius:18px; padding:12px 20px;
  box-shadow:0 4px 16px rgba(0,0,0,0.1); border:3px solid rgba(255,255,255,0.8);
}
.cm-target-label { font-size:clamp(10px,2vw,15px); color:#999; font-weight:900; }
.cm-target-emoji { font-size:clamp(44px,10vw,78px); animation:cm-pulse 1.1s ease-in-out infinite; }
@keyframes cm-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.11)} }
.cm-choices { display:flex; gap:clamp(9px,2.2vw,18px); flex-wrap:wrap; justify-content:center; }
.cm-choice {
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  border-radius:50%; border:5px solid rgba(255,255,255,0.7);
  box-shadow:0 6px 18px rgba(0,0,0,0.15),inset 0 -3px 8px rgba(0,0,0,0.07);
  transition:transform 0.1s; position:relative; overflow:hidden;
  animation:choice-in 0.38s cubic-bezier(.34,1.56,.64,1) both;
}
.cm-choice::after { content:''; position:absolute; top:10%;left:15%; width:28%;height:16%; background:rgba(255,255,255,0.45); border-radius:50%; transform:rotate(-30deg); }
@keyframes choice-in { from{opacity:0;transform:scale(0.2)} to{opacity:1;transform:scale(1)} }
.cm-choice:active { transform:scale(0.88); }
.cm-correct { animation:correct-pop 0.4s ease-out forwards !important; }
@keyframes correct-pop { 0%{transform:scale(1)} 35%{transform:scale(1.55) rotate(12deg)} 70%{transform:scale(1.2) rotate(-6deg)} 100%{transform:scale(1)} }
.cm-wrong { animation:wrong-shake 0.33s ease-out forwards !important; }
@keyframes wrong-shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-11px)} 75%{transform:translateX(11px)} }

/* MODE 6 — FIREWORKS */
#mode6-screen { background:#0d1b4b; }
.fw-title {
  position:fixed; top:16px; left:0; right:0; text-align:center;
  font-size:clamp(14px,3.5vw,26px); color:#ffe082; font-weight:900;
  text-shadow:0 0 16px #ffd54f; z-index:10; pointer-events:none;
}
.fw-hint {
  position:fixed; bottom:20px; left:0; right:0; text-align:center;
  font-size:clamp(12px,2.5vw,19px); color:rgba(255,255,255,0.5); z-index:10; pointer-events:none;
  animation:hint-fade 3s ease-in-out infinite;
}
@keyframes hint-fade { 0%,100%{opacity:0.35} 50%{opacity:0.85} }
canvas#fw-canvas { position:fixed; inset:0; z-index:5; }
</style>
</head>
<body>

<!-- TOP SCREEN -->
<div id="top-screen" class="screen">
  <div class="deco-float" style="top:4%;left:4%;animation-delay:0s">🌟</div>
  <div class="deco-float" style="top:5%;right:7%;animation-delay:0.7s">🌈</div>
  <div class="deco-float" style="bottom:10%;left:5%;animation-delay:1.3s">🎈</div>
  <div class="deco-float" style="bottom:8%;right:5%;animation-delay:0.4s">🍭</div>
  <div class="top-title">心ちゃんのゲームランド！🎪</div>
  <div class="top-sub">すきなあそびをえらんでね ✨</div>
  <div class="modes-grid">
    <div class="mode-card" data-mode="1"><div class="mode-icon">🐶</div><div class="mode-name">どうぶつたっち</div><div class="mode-desc">うごく どうぶつを<br>たっちしよう！</div></div>
    <div class="mode-card" data-mode="2"><div class="mode-icon">🎹</div><div class="mode-name">ピアノ</div><div class="mode-desc">けんばんを たたいて<br>おとをだそう！</div></div>
    <div class="mode-card" data-mode="3"><div class="mode-icon">🫧</div><div class="mode-name">あわわポン！</div><div class="mode-desc">うかんでる あわを<br>わらせよう！</div></div>
    <div class="mode-card" data-mode="4"><div class="mode-icon">🥁</div><div class="mode-name">たいこドン！</div><div class="mode-desc">かたちを たたいて<br>おんがくしよう！</div></div>
    <div class="mode-card" data-mode="5"><div class="mode-icon">🔴</div><div class="mode-name">いろあわせ！</div><div class="mode-desc">おなじ いろを<br>みつけよう！</div></div>
    <div class="mode-card" data-mode="6"><div class="mode-icon">🎆</div><div class="mode-name">はなびドン！</div><div class="mode-desc">たっちしたら<br>はなびがドーン！</div></div>
  </div>
</div>

<!-- MODE 1 -->
<div id="mode1-screen" class="screen hidden">
  <div class="game-bg" id="m1-bg"></div>
  <button class="back-btn" data-back>← もどる</button>
  <div class="score-badge" id="m1-score">⭐ 0</div>
  <div id="m1-area" style="position:fixed;inset:0;z-index:5;"></div>
  <div class="praise-fx" id="m1-praise"></div>
</div>

<!-- MODE 2 -->
<div id="mode2-screen" class="screen hidden">
  <button class="back-btn" data-back>← もどる</button>
  <div class="praise-fx" id="m2-praise"></div>
  <div class="piano-wrap">
    <div class="piano-title">🎵 ピアノをならそう！ 🎵</div>
    <div class="piano-keys" id="piano-keys"></div>
  </div>
</div>

<!-- MODE 3 -->
<div id="mode3-screen" class="screen hidden">
  <div class="game-bg" id="m3-bg" style="background:linear-gradient(160deg,#e0f7fa,#e8eaf6,#fce4ec)"></div>
  <button class="back-btn" data-back>← もどる</button>
  <div class="score-badge" id="m3-score">⭐ 0</div>
  <div id="m3-area" style="position:fixed;inset:0;z-index:5;"></div>
  <div class="praise-fx" id="m3-praise"></div>
</div>

<!-- MODE 4 -->
<div id="mode4-screen" class="screen hidden">
  <button class="back-btn" data-back>← もどる</button>
  <div class="praise-fx" id="m4-praise"></div>
  <div class="drum-wrap">
    <div class="drum-title">🥁 たいこドン！ドン！ 🥁</div>
    <div id="drum-pads"></div>
  </div>
</div>

<!-- MODE 5 -->
<div id="mode5-screen" class="screen hidden">
  <button class="back-btn" data-back>← もどる</button>
  <div class="score-badge" id="m5-score">⭐ 0</div>
  <div class="praise-fx" id="m5-praise"></div>
  <div class="colormatch-wrap">
    <div class="cm-title">🔴 おなじいろをみつけよう！</div>
    <div class="cm-target-box">
      <div class="cm-target-label">どれと おなじ？</div>
      <div class="cm-target-emoji" id="cm-target">🔴</div>
    </div>
    <div class="cm-choices" id="cm-choices"></div>
  </div>
</div>

<!-- MODE 6 -->
<div id="mode6-screen" class="screen hidden">
  <canvas id="fw-canvas"></canvas>
  <button class="back-btn" data-back style="color:#ffe082;border-color:#ffe082;background:rgba(0,0,0,0.5)">← もどる</button>
  <div class="fw-title">🎆 はなびをあげよう！ 🎆</div>
  <div class="fw-hint">たっちしてね！</div>
  <div class="praise-fx" id="m6-praise"></div>
</div>

<script>
// ===== AUDIO =====
let audioCtx;
function getAC(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function tone(freqs,type='sine',vol=0.18){
  try{ const c=getAC(); freqs.forEach(([f,s,d])=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=type; o.frequency.setValueAtTime(f,c.currentTime+s); g.gain.setValueAtTime(vol,c.currentTime+s); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+s+d); o.start(c.currentTime+s);o.stop(c.currentTime+s+d+0.05); }); }catch(e){}
}
function playPop()    { tone([[520,0,0.13],[730,0.06,0.13],[960,0.13,0.17]],'triangle'); }
function playHappy()  { tone([[523,0,0.1],[659,0.1,0.1],[784,0.2,0.1],[1047,0.3,0.25]],'sine'); }
function playBubble() { tone([[820,0,0.04],[1150,0.04,0.09],[1450,0.09,0.11]],'sine',0.11); }
function playNote(f)  { tone([[f,0,0.65]],'triangle',0.24); }
function playCorrect(){ tone([[600,0,0.09],[800,0.09,0.09],[1000,0.18,0.2]],'sine',0.2); }
function playWrong()  { tone([[200,0,0.14],[150,0.1,0.18]],'sawtooth',0.12); }
function playBoom()   { tone([[90,0,0.38],[60,0.05,0.45],[40,0.14,0.55]],'sawtooth',0.2); }
function playDrum(f,t){ try{ const c=getAC(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t; o.frequency.setValueAtTime(f,c.currentTime); o.frequency.exponentialRampToValueAtTime(f*0.1,c.currentTime+0.3); g.gain.setValueAtTime(0.28,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.34); o.start(c.currentTime);o.stop(c.currentTime+0.38); }catch(e){} }

// ===== FX =====
const STARS_FX=['⭐','🌟','✨','💫','🎉','🎊','🍭','🌈','❤️','💛','💚','💙','💜'];
const COLORS=['#FF6F00','#E91E63','#9C27B0','#2196F3','#4CAF50','#FF9800'];
const PRAISES=['やったー！','すごーい！','えらい！','かわいい！','ばんざい！','やったね！','さいこー！'];

function burstStars(cx,cy,n=8){
  for(let i=0;i<n;i++){
    const el=document.createElement('div'); el.className='star-fx';
    const a=(i/n)*Math.PI*2+Math.random()*0.5,d=60+Math.random()*100;
    el.style.setProperty('--tx',Math.cos(a)*d+'px'); el.style.setProperty('--ty',Math.sin(a)*d+'px');
    el.style.left=(cx-15)+'px'; el.style.top=(cy-15)+'px';
    el.textContent=STARS_FX[Math.floor(Math.random()*STARS_FX.length)];
    document.body.appendChild(el); setTimeout(()=>el.remove(),1000);
  }
}
function doRipple(cx,cy,color){ const el=document.createElement('div'); el.className='ripple-fx'; const s=50; el.style.cssText=`width:${s}px;height:${s}px;left:${cx-s/2}px;top:${cy-s/2}px;background:${color};`; document.body.appendChild(el); setTimeout(()=>el.remove(),700); }
function floatText(cx,cy,txt,color){ const el=document.createElement('div'); el.className='star-fx'; el.style.setProperty('--tx','0px'); el.style.setProperty('--ty','-82px'); el.style.cssText+=`left:${cx}px;top:${cy-46}px;transform:translateX(-50%);font-size:clamp(17px,3.8vw,28px);font-weight:900;color:${color};text-shadow:2px 2px 0 white;`; el.textContent=txt; document.body.appendChild(el); setTimeout(()=>el.remove(),1100); }
function praise(el){ el.textContent=PRAISES[Math.floor(Math.random()*PRAISES.length)]; el.classList.remove('show'); void el.offsetWidth; el.classList.add('show'); playHappy(); setTimeout(()=>el.classList.remove('show'),1400); }
function flashBg(bgEl,cx,cy,cols){ bgEl.style.background=`radial-gradient(ellipse at ${(cx/innerWidth*100)|0}% ${(cy/innerHeight*100)|0}%,${cols[0]},${cols[1]} 55%,${cols[2]} 100%)`; bgEl.style.filter='brightness(1.4) saturate(2)'; setTimeout(()=>bgEl.style.filter='',350); }

// ===== NAV =====
let currentMode=null;
const cleanup={}, inits={};
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

document.addEventListener('pointerdown',e=>{
  const card=e.target.closest('[data-mode]');
  if(card){ const m=card.dataset.mode; if(currentMode&&cleanup[currentMode])cleanup[currentMode](); currentMode=m; showScreen('mode'+m+'-screen'); if(inits[m])inits[m](); return; }

// ===== MODE 5 — COLOR MATCH =====
const CM_ITEMS=[
  {emoji:'🔴',color:'#ef5350'},{emoji:'🟠',color:'#ff9800'},
  {emoji:'🟡',color:'#ffee58'},{emoji:'🟢',color:'#66bb6a'},
  {emoji:'🔵',color:'#42a5f5'},{emoji:'🟣',color:'#ab47bc'},
  {emoji:'🟤',color:'#8d6e63'},{emoji:'⚫',color:'#546e7a'},
];
inits['5']=()=>{
  let score=0,answering=false;
  const scoreEl=document.getElementById('m5-score'),praiseEl=document.getElementById('m5-praise');
  const targetEl=document.getElementById('cm-target'),choicesEl=document.getElementById('cm-choices');
  score=0; scoreEl.textContent='⭐ 0';
  function nextRound(){
    answering=false;
    const ci=Math.floor(Math.random()*CM_ITEMS.length);
    const correct=CM_ITEMS[ci];
    targetEl.textContent=correct.emoji;
    let others=CM_ITEMS.filter((_,i)=>i!==ci).sort(()=>Math.random()-0.5).slice(0,3);
    const choices=[...others,correct].sort(()=>Math.random()-0.5);
    choicesEl.innerHTML='';
    choices.forEach((item,i)=>{
      const btn=document.createElement('div'); btn.className='cm-choice';
      const sz=Math.max(68,Math.min(106,innerWidth*0.155));
      btn.style.cssText=`width:${sz}px;height:${sz}px;background:radial-gradient(circle at 35% 35%,${item.color}ee,${item.color}88);font-size:${sz*0.55}px;animation-delay:${i*0.07}s`;
      btn.textContent=item.emoji;
      btn.addEventListener('pointerdown',ev=>{ ev.preventDefault(); if(answering)return; answering=true; const cx=ev.clientX,cy=ev.clientY;
        if(item.emoji===correct.emoji){ btn.classList.add('cm-correct'); playCorrect(); burstStars(cx,cy,12); doRipple(cx,cy,item.color); score++; scoreEl.textContent='⭐ '+score; scoreEl.classList.remove('bump');void scoreEl.offsetWidth;scoreEl.classList.add('bump'); if(score%5===0)praise(praiseEl); floatText(cx,cy,'ピンポン！🎉','#ff6f00'); setTimeout(nextRound,900);
        } else { btn.classList.add('cm-wrong'); playWrong(); doRipple(cx,cy,'#ff5252'); floatText(cx,cy,'もういちど！','#e91e63'); setTimeout(()=>{ btn.classList.remove('cm-wrong'); answering=false; },600); }
      });
      choicesEl.appendChild(btn);
    });
  }
  nextRound();
  cleanup['5']=()=>{ choicesEl.innerHTML=''; targetEl.textContent=''; };
};

// ===== MODE 6 — FIREWORKS =====
inits['6']=()=>{
  const canvas=document.getElementById('fw-canvas');
  const ctx=canvas.getContext('2d');
  const praiseEl=document.getElementById('m6-praise');
  let particles=[],animId,taps=0;
  function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
  resize();
  const FW_COLORS=['#ff5252','#ff6f00','#ffca28','#69f0ae','#40c4ff','#e040fb','#ff4081','#fff176','#80d8ff','#ccff90','#ff80ab','#ea80fc'];
  class Particle{
    constructor(x,y,color,type='burst'){
      this.x=x;this.y=y;this.color=color;this.type=type;
      if(type==='burst'){ const a=Math.random()*Math.PI*2,sp=2+Math.random()*8; this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp; this.size=3+Math.random()*5; this.life=1;this.decay=0.013+Math.random()*0.017;this.gravity=0.09; }
      else { this.vx=(Math.random()-0.5)*3;this.vy=-1-Math.random()*3; this.size=2+Math.random()*3; this.life=1;this.decay=0.025+Math.random()*0.02;this.gravity=0.04; }
    }
    update(){ this.x+=this.vx;this.y+=this.vy;this.vy+=this.gravity;this.vx*=0.98;this.life-=this.decay; }
    draw(c){ c.save();c.globalAlpha=Math.max(0,this.life);c.fillStyle=this.color;c.shadowBlur=this.type==='burst'?18:8;c.shadowColor=this.color;c.beginPath();c.arc(this.x,this.y,this.size*this.life,0,Math.PI*2);c.fill();c.restore(); }
  }
  function launch(x,y){
    playBoom();
    const col=FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
    const col2=FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
    for(let i=0;i<65;i++) particles.push(new Particle(x,y,i%3===0?col2:col,'burst'));
    for(let i=0;i<22;i++) particles.push(new Particle(x,y,'#ffffff','sparkle'));
    taps++; if(taps%5===0)praise(praiseEl);
  }
  let autoT;
  function autoLaunch(){ if(currentMode!=='6')return; launch(innerWidth*0.15+Math.random()*innerWidth*0.7, innerHeight*0.12+Math.random()*innerHeight*0.5); autoT=setTimeout(autoLaunch,2000+Math.random()*2200); }
  autoT=setTimeout(autoLaunch,900);
  function animate(){ animId=requestAnimationFrame(animate); ctx.fillStyle='rgba(13,27,75,0.17)'; ctx.fillRect(0,0,canvas.width,canvas.height); particles=particles.filter(p=>{ p.update();p.draw(ctx);return p.life>0; }); }
  animate();
  canvas.addEventListener('pointerdown',e=>{ e.preventDefault(); launch(e.clientX,e.clientY); burstStars(e.clientX,e.clientY,7); });
  window.addEventListener('resize',resize);
  cleanup['6']=()=>{ cancelAnimationFrame(animId);clearTimeout(autoT);particles=[];ctx.clearRect(0,0,canvas.width,canvas.height); };
};
